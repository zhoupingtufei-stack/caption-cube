<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swipe Caption Cube</title>
<style>
body{
    margin:0;height:100vh;display:flex;justify-content:center;align-items:center;
    background:#f5f5f5;overflow:hidden;font-family:sans-serif;flex-direction:column;
}
.scene{width:280px;height:280px;perspective:1000px;}
.cube{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .8s ease;}
.face{
    position:absolute;width:280px;height:280px;background:white;border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);display:flex;justify-content:center;
    align-items:center;text-align:center;padding:25px;box-sizing:border-box;
    font-size:22px;font-weight:bold;
}
.front{transform:translateZ(140px);}
.right{transform:rotateY(90deg) translateZ(140px);}
.back{transform:rotateY(180deg) translateZ(140px);}
.left{transform:rotateY(-90deg) translateZ(140px);}
.guide{margin-top:30px;color:#666;}
</style>
</head>
<body>
<div class="scene">
<div class="cube" id="cube">
<div class="face front">キャプション①<br><br>自己紹介</div>
<div class="face right">キャプション②<br><br>作品紹介</div>
<div class="face back">キャプション③<br><br>将来の目標</div>
<div class="face left">キャプション①</div>
</div>
</div>
<div class="guide">← スワイプして回転 →</div>
<script>
const cube=document.getElementById("cube");
let startX=0,currentFace=0;
function updateCube(){cube.style.transform=`rotateY(${-90*currentFace}deg)`;}
document.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;});
document.addEventListener("touchend",e=>{
 let diff=e.changedTouches[0].clientX-startX;
 if(diff<-50) currentFace++;
 if(diff>50) currentFace--;
 if(currentFace<0) currentFace=2;
 if(currentFace>2) currentFace=0;
 updateCube();
});
</script>
</body>
</html>
